[package]
name = "waymark-soak-harness"
version.workspace = true
publish.workspace = true
edition = "2024"

[dependencies]
waymark-backend-postgres = { workspace = true }
waymark-backend-postgres-migrations = { workspace = true }
waymark-core-backend = { workspace = true }
waymark-dag = { workspace = true }
waymark-dag-builder = { workspace = true }
waymark-ids = { workspace = true }
waymark-ir-parser = { workspace = true }
waymark-proto = { workspace = true }
waymark-runner-state = { workspace = true }
waymark-secret-string = { workspace = true }
waymark-workflow-registry-backend = { workspace = true }

anyhow = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
prost = { workspace = true }
rand = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "process", "signal"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid = { workspace = true }
